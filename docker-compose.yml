services:
  db:
    image: postgres:16-alpine
    container_name: stockroom-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: stockroom
      POSTGRES_USER: stockroom
      POSTGRES_PASSWORD: stockroom_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockroom"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockroom-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://stockroom:stockroom_secret@db:5432/stockroom?schema=public
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads
      BACKUP_DIR: /app/backups
    volumes:
      - uploads:/app/uploads
      - backups:/app/backups
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockroom-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
  backups:
